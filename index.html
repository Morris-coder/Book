<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna & Milo: Kindness Rainbow | Official Interactive Book</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .rainbow-gradient { background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #ff9ff3); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .book-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        
        /* Modal Styling */
        #paymentModal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.9); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
        }
        .page-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

    <div class="flex items-center justify-center h-screen">
        <button onclick="openModal()" class="px-8 py-4 rainbow-gradient text-white font-bold rounded-full hover:scale-105 transition-transform shadow-lg">
            Buy the PDF Edition
        </button>
    </div>

    <div id="paymentModal">
        <div class="bg-white rounded-[2.5rem] p-10 max-w-md w-full mx-4 shadow-2xl text-center relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-600 text-3xl">&times;</button>
            
            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 transform rotate-12">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>

            <h3 class="text-2xl font-extrabold mb-3">Get the PDF Edition</h3>
            <p class="text-slate-500 mb-8 leading-relaxed">Secure your high-resolution digital copy of the 75-page Kindness Rainbow adventure.</p>
            
            <div class="space-y-4">
                <button onclick="handleSuccess()" class="w-full py-4 bg-[#635bff] text-white rounded-2xl font-bold hover:scale-[1.02] transition-transform">Pay with Stripe</button>
                <button onclick="handleSuccess()" class="w-full py-4 bg-[#ffc439] text-black rounded-2xl font-bold hover:scale-[1.02] transition-transform">Pay with PayPal</button>
            </div>
        </div> </div> <script>
        const modal = document.getElementById('paymentModal');

        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function handleSuccess() {
            alert('Thank you for your purchase! Redirecting...');
            closeModal();
        }

        // Close modal if clicking outside the white box
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
